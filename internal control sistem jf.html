<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { background: #0f172a; color: white; width: 250px; height: 100vh; position: fixed; padding: 20px; overflow-y: auto; }
        .main { margin-left: 250px; padding: 30px; }
        .nav-btn { cursor: pointer; padding: 10px; color: #94a3b8; }
        .nav-btn:hover { background: #1e293b; color: #deff9a; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar"><h5>INTERNAL CONTROL</h5><hr><div id="menu"></div></div>

<div class="main">
    <h2 id="title" class="mb-3">Pilih Sheet</h2>
    
    <div class="row mb-3">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Cari data (Asal, Tujuan, Status...)" onkeyup="searchData()">
        </div>
    </div>

    <div id="filterKandang" class="mb-3 hidden">
        <button class="btn btn-primary btn-sm" onclick="filterG('Cuci')">Cuci</button>
        <button class="btn btn-warning btn-sm" onclick="filterG('Disinfectan')">Disinfectan</button>
        <button class="btn btn-info btn-sm" onclick="filterG('Istirahat')">Istirahat</button>
        <button class="btn btn-success btn-sm" onclick="filterG('Siap Pakai')">Siap Pakai</button>
        <button class="btn btn-secondary btn-sm" onclick="resetSearch()">Reset</button>
    </div>

    <button class="btn btn-dark mb-3" onclick="toggleForm()">+ Buat Rencana Baru</button>
    <div id="formContainer" class="card p-3 mb-4 shadow-sm hidden">
        <h5>Rencana Perpindahan (Multi-Layer)</h5>
        <div id="layerContainer">
            <div class="row mb-2">
                <div class="col-3"><input type="text" id="asal" class="form-control" placeholder="Kandang Asal"></div>
                <div class="col-3"><input type="text" class="form-control tujuan" placeholder="Tujuan Layer"></div>
                <div class="col-2"><input type="number" class="form-control jml" placeholder="Jumlah"></div>
                <div class="col-3"><input type="date" class="form-control tgl"></div>
            </div>
        </div>
        <button class="btn btn-sm btn-dark mt-2" onclick="addLayer()">+ Tambah Layer</button>
        <button class="btn btn-success mt-2" onclick="save()">Simpan Semua</button>
    </div>
    
    <table class="table table-hover table-bordered shadow-sm">
        <thead id="tHead" class="table-dark"></thead>
        <tbody id="tBody"></tbody>
    </table>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycby_NuC3Rj5Ed0QedTZVfO8BirPTWVmlssRuSPHU3rNXlJfC_mBcrgV4TjMDKpYok77W/exec"; // GANTI DENGAN URL EXEC ANDA
    let master = [];

    async function init() {
        const res = await (await fetch(API)).json();
        document.getElementById('menu').innerHTML = res.sheets.map(s => `<div class="nav-btn" onclick="load('${s}')">${s}</div>`).join('');
    }

    async function load(s) {
        master = await (await fetch(API + "?sheet=" + encodeURIComponent(s))).json();
        document.getElementById('title').innerText = s;
        document.getElementById('formContainer').classList.add('hidden');
        document.getElementById('filterKandang').style.display = (s.includes('Garuda 1') || s.includes('Garuda 2')) ? 'block' : 'none';
        render(master);
    }

    function render(data) {
        if(!data.length) return;
        const keys = Object.keys(data[0]);
        document.getElementById('tHead').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
        document.getElementById('tBody').innerHTML = data.map(r => `<tr>${keys.map(k => `<td>${r[k]||''}</td>`).join('')}</tr>`).join('');
    }

    function searchData() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(master.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q))));
    }

    function filterG(s) {
        render(master.filter(r => r.Status && r.Status.includes(s)));
    }

    function resetSearch() {
        document.getElementById('searchInput').value = "";
        render(master);
    }

    function toggleForm() { document.getElementById('formContainer').classList.toggle('hidden'); }

    function addLayer() {
        document.getElementById('layerContainer').innerHTML += `<div class="row mb-2"><div class="col-3"></div><div class="col-3"><input type="text" class="form-control tujuan" placeholder="Tujuan"></div><div class="col-2"><input type="number" class="form-control jml" placeholder="Jumlah"></div><div class="col-3"><input type="date" class="form-control tgl"></div></div>`;
    }

    async function save() {
        const asal = document.getElementById('asal').value;
        const tujuanList = [...document.querySelectorAll('.tujuan')].map((el, i) => ({
            tujuan: el.value, jumlah: document.querySelectorAll('.jml')[i].value, tanggal: document.querySelectorAll('.tgl')[i].value
        }));
        await fetch(API, {method: "POST", mode: "no-cors", body: JSON.stringify({asal, tujuanList})});
        alert("Rencana Berhasil Disimpan!");
    }
    init();
</script>
</body>
</html>
